version: "3.9"
services:
  clip-scraper:
    build: .
    container_name: clip-scraper
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    # Limite mémoire (Playwright = gourmand). 2GB suffisent pour 100-200 clippeurs.
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
